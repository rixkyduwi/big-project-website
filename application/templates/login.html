{% extends "layout.html"%}
{% block content %}
<div class="col-lg-8 col-md-6 col-sm-12">
    <div class="contact-form">
        <form id="contact" action="send.js" method="get">
            <div class="row">
                <div class="col-lg-6 col-md-12 col-sm-12">
                    <fieldset>
                        <input name="name" type="text" class="form-control" id="name"
                            placeholder="username" required="">
                    </fieldset>
                </div>
                <div class="col-lg-6 col-md-12 col-sm-12">
                    <fieldset>
                        <input name="pswd" type="password" class="form-control" id="email"
                            placeholder="password" required="">
                    </fieldset>
                </div>
                <div class="col-lg-12">
                    <fieldset>
                        <button type="submit" id="form-submit" onclick="alert('Selamat Datang!')"
                            class="main-button">Send</button>
                    </fieldset>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
